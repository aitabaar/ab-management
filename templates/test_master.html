<!doctype html>
<html><head><meta charset="utf-8"><title>Test Master</title></head><body>
<h1>Test Master</h1>
<form method="post" action="/test_master/update">
  <table border="1" cellpadding="6"><tr><th>ID</th><th>Test</th><th>Department</th><th>Price</th><th>Status</th></tr>
  {% for t in tests %}
    <tr>
      <td>{{ t['id'] }}</td>
      <td>{{ t['test_name'] }}</td>
      <td>{{ t['department'] }}</td>
      <td><input name="price__{{ t['id'] }}" value="{{ t['price'] }}"></td>
      <td>{{ t['status'] }}</td>
    </tr>
  {% endfor %}
  </table>
  <div style="margin-top:12px"><button type="submit">Save Prices</button></div>
</form>
<p><a href="/">Back</a></p>
</body></html>
