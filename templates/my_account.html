{% extends "base.html" %}{% set title="My Account" %}{% block content %}
<div class="panel">
  <div class="panel-title">Change Password</div>
  {% if error %}<div class="alert danger">{{ error }}</div>{% endif %}
  {% if success %}<div class="alert success">{{ success }}</div>{% endif %}
  <form method="post" action="/my-account/password" class="grid">
    <label>Current Password<input name="current_password" type="password" required></label>
    <label>New Password<input name="new_password" type="password" required></label>
    <label>Confirm New Password<input name="confirm_password" type="password" required></label>
    <button class="btn green">Change Password</button>
  </form>
</div>
{% endblock %}
