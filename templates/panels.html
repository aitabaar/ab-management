{% extends "base.html" %}{% block h1 %}Panel Rates{% endblock %}{% block content %}<div class="card"><form><div class="formgrid"><select name="panel">{% for p in panels %}<option {% if p.name==panel %}selected{% endif %}>{{ p.name }}</option>{% endfor %}</select><input name="q" value="{{ q }}" placeholder="Search"><button class="btn">Open</button></div></form></div><form method="post" action="/panels/update" class="card"><input name="panel" value="{{ panel }}"><table><tr><th>Test</th><th>Department</th><th>Self Price</th><th>Panel Price</th></tr>{% for r in rows %}<tr><td><input type="hidden" name="test_name" value="{{ r.test_name }}">{{ r.test_name }}</td><td>{{ r.department }}</td><td>{{ r.self_price|money }}</td><td><input name="price" type="number" value="{{ r.panel_price }}"></td></tr>{% endfor %}</table><br><button class="btn green">Save Rates</button></form>{% endblock %}
